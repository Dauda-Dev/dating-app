services:
  - type: web
    name: heartsync-api
    runtime: node
    region: oregon
    plan: free           # change to 'starter' or higher for production
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000       # Render assigns this automatically; keep in sync

      # Injected automatically by Render when linked to the database below
      - key: DATABASE_URL
        fromDatabase:
          name: heartsync-db
          property: connectionString

      # ── Secrets: fill these in the Render dashboard ──────────────────────
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY
        value: 7d
      - key: SESSION_SECRET
        sync: false

      # Google OAuth
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false        # e.g. https://heartsync-api.onrender.com/api/auth/google/callback

      # Mailgun
      - key: MAILGUN_API_KEY
        sync: false
      - key: MAILGUN_DOMAIN
        sync: false
      - key: MAILGUN_FROM_EMAIL
        sync: false

      # Cloudinary
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # Daily.co
      - key: DAILY_API_KEY
        sync: false

      # Paystack
      - key: PAYSTACK_SECRET_KEY
        sync: false

      # App
      - key: FRONTEND_URL
        sync: false        # Your web app URL or mobile deep-link base
      - key: CORS_ORIGIN
        sync: false        # Comma-separated allowed origins, or leave blank for *

      # Optional Redis (add a Redis service and link here if desired)
      # - key: REDIS_URL
      #   fromService:
      #     name: heartsync-redis
      #     type: redis
      #     property: connectionString

      # Steal / Video config
      - key: STEAL_REQUEST_EXPIRY_HOURS
        value: 48
      - key: VIDEO_CALL_MIN_DURATION
        value: 120
      - key: VIDEO_CALL_MAX_DURATION
        value: 600
      - key: VIDEO_ROOM_EXPIRY_SECONDS
        value: 3600

databases:
  - name: heartsync-db
    databaseName: heartsync
    user: heartsync_user
    region: oregon
    plan: free             # change to 'starter' for persistent storage
